name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src\HomeAssistantByBatuPlugin.csproj

      - name: Build Release
        run: dotnet build src\HomeAssistantByBatuPlugin.csproj -c Release --no-restore

      - name: Upload .lplug4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeAssistantByBatuPlugin
          path: output/HomeAssistantByBatuPlugin.lplug4

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/HomeAssistantByBatuPlugin.lplug4
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
